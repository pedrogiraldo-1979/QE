name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://izbfawwmbilmsrdjaanw.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_cDOIp7vIy26upnmBdNUBKg_HBcqDqWd
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0

      - name: Setup pnpm
        run: npm install --global pnpm@11.7.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and contract tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Start production server
        run: |
          pnpm start > /tmp/qe-next.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/qe-next.log
          exit 1

      - name: HTTP smoke
        run: pnpm test:smoke

      - name: Server log on failure
        if: failure()
        run: cat /tmp/qe-next.log || true
